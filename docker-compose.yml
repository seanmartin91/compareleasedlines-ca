version: '3.8'

services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db_name
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: postgres://user:password@postgres:5432/db_name
    ports:
      - '8000:8000'

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - '3000:3000'